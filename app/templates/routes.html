{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Routes</h1>
    <p class="text-sm text-gray-500 mt-1">Define routes for profitability tracking</p>
  </div>
  {% if user.role == "owner" %}
  <button class="btn-modern btn-primary-modern" onclick="document.getElementById('add-modal').showModal()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    Add Route
  </button>
  {% endif %}
</div>

<dialog id="add-modal" class="modal">
  <div class="modal-box rounded-xl p-6">
    <h3 class="text-lg font-bold mb-4">New Route</h3>
    <form id="route-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Route name</label>
        <input type="text" id="rname" class="input-modern" placeholder="e.g. Soweto – CBD" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Distance (km)</label>
        <input type="number" step="0.1" id="rdist" class="input-modern" placeholder="Optional">
      </div>
      <div class="modal-action mt-6">
        <button type="button" class="btn-modern btn-ghost-modern" onclick="document.getElementById('add-modal').close()">Cancel</button>
        <button type="submit" class="btn-modern btn-primary-modern">Save Route</button>
      </div>
    </form>
    <script>
    document.getElementById('route-form').addEventListener('submit', function(e) {
      e.preventDefault();
      fetch('/api/routes', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          name: document.getElementById('rname').value,
          distance_km: parseFloat(document.getElementById('rdist').value) || null,
        }),
      }).then(r => {
        if (r.ok) {
          document.getElementById('add-modal').close();
          document.getElementById('route-form').reset();
          htmx.trigger('#route-list tbody', 'load');
        } else {
          r.json().then(d => alert(d.detail || 'Failed to save route'));
        }
      });
    });
    </script>
  </div>
</dialog>

<div class="card-modern">
  <div class="overflow-x-auto">
    <table class="table-modern" id="route-list">
      <thead>
        <tr>
          <th>Name</th>
          <th>Distance (km)</th>
        </tr>
      </thead>
      <tbody hx-get="/partials/routes" hx-trigger="load" hx-target="closest tbody">
        <tr><td colspan="2" class="text-center text-gray-400 py-8">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
