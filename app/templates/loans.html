{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Taxi Loans (HP)</h1>
    <p class="text-sm text-gray-500 mt-1">Track hire-purchase finance and payments per taxi</p>
  </div>
  <button class="btn-modern btn-primary-modern" onclick="openAddModal()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    Add Loan
  </button>
</div>

<dialog id="add-modal" class="modal">
  <div class="modal-box rounded-xl p-6">
    <h3 class="text-lg font-bold mb-4">New Taxi Loan</h3>
    <form id="loan-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Taxi</label>
        <select id="loan-taxi" class="input-modern" required>
          <option value="">— Select taxi —</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Lender</label>
        <input type="text" id="loan-lender" class="input-modern" placeholder="e.g. WesBank" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Total loan amount (rand cents)</label>
        <input type="number" id="loan-total" class="input-modern" placeholder="e.g. 50000000 = R500,000" min="0" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Remaining balance (rand cents)</label>
        <input type="number" id="loan-balance" class="input-modern" placeholder="e.g. 30000000 = R300,000" min="0" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Monthly instalment (rand cents)</label>
        <input type="number" id="loan-instalment" class="input-modern" placeholder="e.g. 850000 = R8,500" min="0" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Start date</label>
        <input type="date" id="loan-start" class="input-modern" required>
      </div>
      <div class="modal-action mt-6">
        <button type="button" class="btn-modern btn-ghost-modern" onclick="document.getElementById('add-modal').close()">Cancel</button>
        <button type="submit" class="btn-modern btn-primary-modern">Save Loan</button>
      </div>
    </form>
    <script>
    function openAddModal() {
      document.getElementById('add-modal').showModal();
      fetch('/api/taxis').then(r => r.json()).then(taxis => {
        const sel = document.getElementById('loan-taxi');
        sel.innerHTML = '<option value="">— Select taxi —</option>';
        taxis.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = t.registration_number;
          sel.appendChild(opt);
        });
      });
      document.getElementById('loan-start').value = new Date().toISOString().split('T')[0];
    }
    document.getElementById('loan-form').addEventListener('submit', function(e) {
      e.preventDefault();
      fetch('/api/taxi-loans', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          taxi_id: document.getElementById('loan-taxi').value,
          lender: document.getElementById('loan-lender').value,
          total_amount_cents: parseInt(document.getElementById('loan-total').value),
          remaining_balance_cents: parseInt(document.getElementById('loan-balance').value),
          monthly_instalment_cents: parseInt(document.getElementById('loan-instalment').value),
          start_date: document.getElementById('loan-start').value,
        }),
      }).then(r => {
        if (r.ok) {
          document.getElementById('add-modal').close();
          document.getElementById('loan-form').reset();
          htmx.trigger('#loan-list tbody', 'load');
        } else {
          r.json().then(d => alert(d.detail || 'Failed to save loan'));
        }
      });
    });
    </script>
  </div>
</dialog>

<div class="card-modern">
  <div class="overflow-x-auto">
    <table class="table-modern" id="loan-list">
      <thead>
        <tr>
          <th>Taxi</th>
          <th>Lender</th>
          <th>Total</th>
          <th>Remaining</th>
          <th>Monthly Instalment</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody hx-get="/partials/loans" hx-trigger="load" hx-target="closest tbody">
        <tr><td colspan="6" class="text-center text-gray-400 py-8">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
