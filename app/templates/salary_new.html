{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Record Salary Payment</h1>
    <p class="text-sm text-gray-500 mt-1">Log a payment made to a driver</p>
  </div>
  <a href="/employees" class="btn-modern btn-ghost-modern">Back</a>
</div>

<div class="card-modern max-w-lg">
  <form id="payment-form" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Employee</label>
      <select id="pay-employee" class="input-modern" required>
        <option value="">— Select employee —</option>
        {% for emp in employees %}
        <option value="{{ emp.id }}" {% if request.query_params.get('employee_id') == emp.id %}selected{% endif %}>{{ emp.driver_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Amount (rand cents)</label>
      <input type="number" id="pay-amount" class="input-modern" placeholder="e.g. 800000 = R8,000" min="1" required>
      <p class="text-xs text-gray-400 mt-1">Enter amount in cents. R8,000 = 800000</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Payment date</label>
      <input type="date" id="pay-date" class="input-modern" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Payment method</label>
      <select id="pay-method" class="input-modern">
        <option value="cash">Cash</option>
        <option value="eft">EFT</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Reference</label>
      <input type="text" id="pay-ref" class="input-modern" placeholder="Optional — e.g. November salary">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
      <input type="text" id="pay-notes" class="input-modern" placeholder="Optional">
    </div>
    <div class="pt-2">
      <button type="submit" class="btn-modern btn-primary-modern w-full">Record Payment</button>
    </div>
  </form>
</div>

<script>
document.getElementById('pay-date').value = new Date().toISOString().split('T')[0];
document.getElementById('payment-form').addEventListener('submit', function(e) {
  e.preventDefault();
  fetch('/api/salary-payments', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      employee_id: document.getElementById('pay-employee').value,
      amount_cents: parseInt(document.getElementById('pay-amount').value),
      payment_date: document.getElementById('pay-date').value,
      payment_method: document.getElementById('pay-method').value,
      reference: document.getElementById('pay-ref').value || null,
      notes: document.getElementById('pay-notes').value || null,
    }),
  }).then(r => {
    if (r.ok) {
      showToast('Payment recorded successfully', 'success');
      const empId = document.getElementById('pay-employee').value;
      window.location = '/employees/' + empId + '/payments';
    } else {
      r.json().then(d => showToast(d.detail || 'Failed to record payment', 'error'));
    }
  });
});
</script>
{% endblock %}
