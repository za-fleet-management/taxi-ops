{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Mechanic Payment</h1>
    <p class="text-sm text-gray-500 mt-1">Log a one-off payment to an external mechanic at a depot.</p>
  </div>
  <a href="/depots" class="btn-modern btn-ghost-modern">Back</a>
</div>

<div class="card-modern max-w-lg">
  <form id="mp-form" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Depot</label>
      <select id="mp-depot" class="input-modern" required>
        <option value="">— Select depot —</option>
        {% for depot in depots %}
        <option value="{{ depot.id }}">{{ depot.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Taxi (optional)</label>
      <select id="mp-taxi" class="input-modern">
        <option value="">— None —</option>
        {% for taxi in taxis %}
        <option value="{{ taxi.id }}">{{ taxi.registration_number }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mechanic name</label>
      <input type="text" id="mp-name" class="input-modern" placeholder="External mechanic name" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description of work</label>
      <input type="text" id="mp-desc" class="input-modern" placeholder="Optional">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Amount (rand cents)</label>
      <input type="number" id="mp-amount" class="input-modern" placeholder="e.g. 250000 = R2,500" min="1" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Payment date</label>
      <input type="date" id="mp-date" class="input-modern" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Payment method</label>
      <select id="mp-method" class="input-modern">
        <option value="cash">Cash</option>
        <option value="eft">EFT</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="pt-2">
      <button type="submit" class="btn-modern btn-primary-modern w-full">Record Payment</button>
    </div>
  </form>
</div>

<script>
document.getElementById('mp-date').value = new Date().toISOString().split('T')[0];
document.getElementById('mp-form').addEventListener('submit', function(e) {
  e.preventDefault();
  fetch('/api/mechanic-payments', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      depot_id: document.getElementById('mp-depot').value,
      taxi_id: document.getElementById('mp-taxi').value || null,
      mechanic_name: document.getElementById('mp-name').value,
      description: document.getElementById('mp-desc').value || null,
      amount_cents: parseInt(document.getElementById('mp-amount').value),
      payment_date: document.getElementById('mp-date').value,
      payment_method: document.getElementById('mp-method').value,
    }),
  }).then(r => {
    if (r.ok) {
      showToast('Mechanic payment recorded', 'success');
      document.getElementById('mp-form').reset();
      document.getElementById('mp-date').value = new Date().toISOString().split('T')[0];
    } else {
      r.json().then(d => showToast(d.detail || 'Failed to record payment', 'error'));
    }
  });
});
</script>
{% endblock %}
