{% if incomes %}
{% for inc in incomes %}
<div class="flex items-center justify-between py-3 {% if not loop.last %}border-b border-gray-100{% endif %}">
  <div>
    <p class="text-sm font-medium text-gray-900">{{ inc.taxi_registration }} — {{ inc.driver_name }}</p>
    <p class="text-xs text-gray-500">{{ inc.date }}</p>
  </div>
  <div class="text-right">
    <p class="text-sm font-semibold text-gray-900">R{{ '%.2f' | format(inc.total_cash / 100) }}</p>
    {% if inc.notes %}<p class="text-xs text-gray-400">{{ inc.notes }}</p>{% endif %}
  </div>
</div>
{% endfor %}
{% else %}
<p class="text-sm text-gray-400 py-4 text-center">No income entries for today.</p>
{% endif %}
