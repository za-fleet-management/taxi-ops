<div hx-get="/api/subscriptions/invoices" hx-trigger="load" hx-swap="innerHTML" hx-target="#invoice-table-body"></div>

<div class="card-modern overflow-x-auto">
  <h2 class="text-lg font-semibold mb-3 px-5 pt-5">Invoices</h2>
  <p class="text-sm text-gray-500 px-5 mb-4">Downloadable PDF invoices for confirmed payments.</p>
  <table class="table-modern text-sm w-full">
    <thead>
      <tr>
        <th>Invoice #</th>
        <th>Date</th>
        <th class="text-right">Amount</th>
        <th>Reference</th>
        <th>Download</th>
      </tr>
    </thead>
    <tbody id="invoice-table-body">
      <tr><td colspan="5" class="text-center text-gray-400 py-4">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function loadInvoices() {
  try {
    const res = await fetch('/api/subscriptions/invoices');
    const invoices = await res.json();
    const tbody = document.getElementById('invoice-table-body');
    if (invoices.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-gray-400 py-4">No invoices yet</td></tr>';
      return;
    }
    tbody.innerHTML = invoices.map(inv => `
      <tr>
        <td class="font-mono text-xs font-semibold">${inv.invoice_number}</td>
        <td>${inv.payment_date}</td>
        <td class="text-right">R ${(inv.amount_cents / 100).toLocaleString()}</td>
        <td class="font-mono text-xs">${inv.reference}</td>
        <td><a href="/api/subscriptions/invoices/${inv.payment_id}/pdf" class="text-blue-600 hover:underline text-xs" target="_blank">Download PDF</a></td>
      </tr>
    `).join('');
  } catch {}
}
loadInvoices();
</script>
