<div hx-get="/api/subscriptions/payments" hx-trigger="load" hx-swap="innerHTML" hx-target="#recon-table" hx-vals='js:{"org_id": (document.getElementById("org-form")?.querySelector("[name=org_id]")?.value || "")}'></div>

<div class="card-modern p-5 mb-4">
  <h2 class="text-lg font-semibold mb-2">Payment Reconciliation</h2>
  <p class="text-sm text-gray-500 mb-4">Track payments from recorded → bank confirmed → fully confirmed.</p>

  <div class="flex gap-4 text-sm mb-6">
    <div class="px-3 py-2 bg-yellow-50 border border-yellow-200 rounded-lg">
      <span class="font-semibold text-yellow-800" id="pending-count">0</span>
      <span class="text-yellow-600"> Pending</span>
    </div>
    <div class="px-3 py-2 bg-blue-50 border border-blue-200 rounded-lg">
      <span class="font-semibold text-blue-800" id="bank-count">0</span>
      <span class="text-blue-600"> Bank Confirmed</span>
    </div>
    <div class="px-3 py-2 bg-green-50 border border-green-200 rounded-lg">
      <span class="font-semibold text-green-800" id="confirmed-count">0</span>
      <span class="text-green-600"> Fully Confirmed</span>
    </div>
  </div>
</div>

<div class="card-modern overflow-x-auto" id="recon-table">
  <table class="table-modern text-sm w-full">
    <thead>
      <tr>
        <th>Date</th>
        <th>Reference</th>
        <th class="text-right">Amount</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="recon-tbody"></tbody>
  </table>
</div>

<script>
async function loadRecon() {
  try {
    const orgId = document.getElementById('org-form')?.querySelector('[name=org_id]')?.value || '';
    let url = '/api/subscriptions/payments';
    if (orgId) url += '?org_id=' + encodeURIComponent(orgId);
    const res = await fetch(url);
    const payments = await res.json();
    const tbody = document.getElementById('recon-tbody');
    let pending = 0, banked = 0, confirmed = 0;

    tbody.innerHTML = payments.map(p => {
      let status, statusClass, actions;
      if (p.confirmed) {
        status = 'Confirmed';
        statusClass = 'badge-modern badge-active';
        actions = '—';
        confirmed++;
      } else if (p.bank_confirmed) {
        status = 'Bank Confirmed';
        statusClass = 'badge-modern' + ' bg-blue-100 text-blue-800';
        actions = `<button class="text-xs text-blue-600 hover:underline" onclick="finalConfirm('${p.id}')">Final Confirm</button>`;
        banked++;
      } else {
        status = 'Pending';
        statusClass = 'badge-modern badge-breakdown';
        actions = `<button class="text-xs text-blue-600 hover:underline" onclick="bankConfirm('${p.id}')">Bank Confirm</button>`;
        pending++;
      }
      return `<tr>
        <td>${p.payment_date}</td>
        <td class="font-mono text-xs">${p.reference}</td>
        <td class="text-right">R ${(p.amount_cents / 100).toLocaleString()}</td>
        <td><span class="${statusClass}">${status}</span></td>
        <td>${actions}</td>
      </tr>`;
    }).join('');

    document.getElementById('pending-count').textContent = pending;
    document.getElementById('bank-count').textContent = banked;
    document.getElementById('confirmed-count').textContent = confirmed;
  } catch {}
}

async function bankConfirm(id) {
  if (!confirm('Mark this payment as received in bank?')) return;
  try {
    const orgId = document.getElementById('org-form')?.querySelector('[name=org_id]')?.value || '';
    let url = `/api/subscriptions/payments/${id}/bank-confirm`;
    if (orgId) url += '?org_id=' + encodeURIComponent(orgId);
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({}),
    });
    if (res.ok) loadRecon();
    else alert('Failed to confirm');
  } catch { alert('Network error'); }
}

async function finalConfirm(id) {
  if (!confirm('Fully confirm this payment?')) return;
  try {
    const orgId = document.getElementById('org-form')?.querySelector('[name=org_id]')?.value || '';
    let url = `/api/subscriptions/payments/${id}/confirm`;
    if (orgId) url += '?org_id=' + encodeURIComponent(orgId);
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({}),
    });
    if (res.ok) loadRecon();
    else alert('Failed to confirm');
  } catch { alert('Network error'); }
}

loadRecon();
</script>
